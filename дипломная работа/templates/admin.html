{% extends "layout.html" %}
{% block content %}
<h2 class="mb-4">Админ-панель</h2>
<div class="card p-4 mb-4 bg-light shadow-sm">
    <h5>Добавить книгу</h5>
    <form method="POST" class="row g-3">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="col-md-4"><input type="text" name="title" class="form-control" placeholder="Название" required></div>
        <div class="col-md-3"><input type="text" name="author" class="form-control" placeholder="Автор" required></div>
        <div class="col-md-2"><input type="number" name="price" class="form-control" placeholder="Цена" required></div>
        <div class="col-md-3"><input type="text" name="img" class="form-control" placeholder="URL картинки"></div>
        <div class="col-12"><button type="submit" class="btn btn-success">Сохранить</button></div>
    </form>
</div>
<div class="table-responsive">
    <table class="table table-hover bg-white rounded shadow-sm">
        <thead class="table-dark">
            <tr><th>Название</th><th>Цена</th><th>Действие</th></tr>
        </thead>
        <tbody>
            {% for book in books %}
            <tr>
                <td>{{ book.title }}</td>
                <td>{{ book.price }} ₽</td>
                <td><a href="/admin/delete/{{ book.id }}" class="text-danger">Удалить</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<div class="mt-4">
    <a href="/admin/reservations" class="btn btn-outline-secondary">📋 Управление бронями</a>
    <a href="/admin/pickup_by_code" class="btn btn-outline-success ms-2 mt-2 mt-sm-0">🔓 Выдача по коду</a>
</div>
{% endblock %}
