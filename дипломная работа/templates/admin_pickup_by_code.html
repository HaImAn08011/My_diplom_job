{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h3 class="mb-0">🔓 Выдача книги по коду</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <div class="mb-3">
                        <label class="form-label">Код бронирования</label>
                        <input type="text" name="code" class="form-control form-control-lg text-center" placeholder="Например: A1B2C3" autocomplete="off" required style="font-family: monospace; font-size: 1.5rem;">
                        <div class="form-text">Введите код, который клиент получил при бронировании.</div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2">✅ Выдать книгу</button>
                    <a href="/admin" class="btn btn-outline-secondary w-100 mt-2">← Вернуться в админку</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
